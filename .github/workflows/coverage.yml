name: Running Code Coverage

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - run: npm run test-cov

      - uses: codecov/codecov-action@v5
